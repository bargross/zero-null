name: Build and Test

on:
  workflow_dispatch:  
  push:
    tags:
      - "v*"          # Trigger on tags like v1.0.0, v2.1.3
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        dotnet: [ '6.0.x', '8.0.x', '9.0.x' ]
    
    steps:
    - uses: actions/checkout@v4
  
    - name: Debug - List directory structure
      run: |
        echo "Root directory contents:"
        ls -la
        echo ""
        echo "ZeroNull directory contents:"
        ls -la ./ZeroNull
        echo ""
        echo "Looking for .sln files:"
        find . -name "*.sln" -type f
      shell: bash
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet }}
    
    - name: Restore dependencies
      run: dotnet restore
      working-directory: ./ZeroNull
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
      working-directory: ./ZeroNull
    
    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal
      working-directory: ./ZeroNull

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: test

    # Only run when a tag starting with 'v' is pushed (e.g., v1.0.0)
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Display tag version
      run: echo "Tag version = ${GITHUB_REF#refs/tags/v}"

    - name: Debug ñ find csproj file
      run: find . -name "*.csproj" -type f
      shell: bash

    - name: Pack NuGet package
      run: |
        dotnet pack ZeroNull/ZeroNull/ZeroNull.csproj \
          --configuration Release \
          --output ./nupkgs \
          -p:PackageVersion="${GITHUB_REF#refs/tags/v}" \
          -p:IncludeSymbols=false \
          -p:IncludeSource=false
      shell: bash

    - name: List nupkg files
      run: |
        echo "Contents of ./nupkgs:"
        ls -la ./nupkgs || echo "Directory does not exist or is empty"
      shell: bash

    - name: Push to NuGet.org
      run: |
        # Loop to push each .nupkg file found
        for pkg in ./nupkgs/*.nupkg; do
          if [ -f "$pkg" ]; then
            echo "Pushing $pkg"
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          else
            echo "No .nupkg files found in ./nupkgs/"
            exit 1
          fi
        done
      shell: bash